services:
  transcributor:
    build: .
    container_name: transcributor
    ports:
      - "8085:8000"
    environment:
      - WHISPER_MODEL=base
      - COLAB_SECRET=my-secret-key-123
      - NGROK_DOMAIN=epilepsy-theology-lucrative.ngrok-free.dev
    volumes:
      - whisper_cache:/root/.cache
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  whisper_cache:
