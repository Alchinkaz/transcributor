services:
  transcributor:
    build: .
    container_name: transcributor
    ports:
      - "8085:8000"
    environment:
      - WHISPER_MODEL=base
    volumes:
      - whisper_cache:/root/.cache
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  whisper_cache:
